<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Students (JSON)</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin: auto;
            background: white;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background: #2196F3;
            color: white;
        }
        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

<h1>Student List (JSON)</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Student Code</th>
        <th>Name</th>
        <th>Major</th>
        <th>GPA</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.student_id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.major }}</td>
        <td>{{ s.gpa }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
